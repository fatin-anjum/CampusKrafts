# Infrastructure for local development: PostgreSQL + Redis.
# Usage:  docker compose up -d   (start)   |   docker compose down   (stop)
# Data persists in named volumes (pgdata, redisdata) — see SETUP-GUIDE.md.

services:
  postgres:
    image: postgres:16-alpine
    container_name: campus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus_pass
      POSTGRES_DB: campuskrafts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus -d campuskrafts"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: campus_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
